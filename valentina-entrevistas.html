<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrevistas — Confecções Valentina Brand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --black-soft: #141414;
    --black-card: #1a1a1a;
    --black-border: #2a2a2a;
    --black-hover: #222222;
    --gold: #c9a96e;
    --gold-light: #e8cfa0;
    --gold-muted: #8a6f42;
    --white: #f5f0eb;
    --white-muted: #b0a99f;
    --white-dim: #6b6560;
    --green: #2d6a4f;
    --green-bg: #0f2a1e;
    --red: #8b2635;
    --red-bg: #2a0f14;
    --amber: #8a6430;
    --amber-bg: #2a1f0a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* Header */
  .site-header {
    border-bottom: 1px solid var(--black-border);
    padding: 2rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--black);
    z-index: 100;
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
  }
  .brand-sub {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 2px;
  }
  .header-right {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white-dim);
  }

  /* Main */
  .main { max-width: 860px; margin: 0 auto; padding: 3rem 2rem 5rem; }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--white);
    margin-bottom: 0.4rem;
  }
  .page-desc {
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--white-dim);
    margin-bottom: 2.5rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2.5rem;
    border: 1px solid var(--black-border);
    border-radius: 4px;
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 0.9rem 1rem;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white-dim);
    background: var(--black-soft);
    border-right: 1px solid var(--black-border);
    transition: all 0.2s;
    text-align: center;
  }
  .tab:last-child { border-right: none; }
  .tab:hover:not(.active) { background: var(--black-hover); color: var(--white-muted); }
  .tab.active { background: var(--black-card); color: var(--gold); border-bottom: 2px solid var(--gold); }
  .tab-icon { font-size: 1rem; display: block; margin-bottom: 3px; }
  .tab-sub { font-size: 0.65rem; color: inherit; opacity: 0.7; letter-spacing: 0.08em; display: block; margin-top: 2px; text-transform: none; }

  /* Progress */
  .progress-wrap { margin-bottom: 2rem; }
  .progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white-dim); }
  .progress-count { font-size: 0.72rem; letter-spacing: 0.1em; color: var(--gold); font-weight: 500; }
  .progress-track { height: 1px; background: var(--black-border); }
  .progress-fill { height: 100%; background: var(--gold); transition: width 0.4s ease; }

  /* Section */
  .section { margin-bottom: 1rem; border: 1px solid var(--black-border); border-radius: 4px; overflow: hidden; }
  .sec-hd {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: var(--black-soft);
    border-bottom: 1px solid var(--black-border);
  }
  .sec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .sec-title { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--white-muted); flex: 1; }
  .sec-time { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--white-dim); }

  /* Items */
  .item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--black-border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--black-hover); }
  .item.done { opacity: 0.4; }
  .item.done .itext { text-decoration: line-through; }

  .cb {
    width: 16px; height: 16px;
    border: 1px solid var(--black-border);
    flex-shrink: 0; margin-top: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .item.done .cb { background: var(--gold); border-color: var(--gold); }
  .ck { display: none; }
  .item.done .ck { display: block; }

  .itext { font-size: 0.88rem; color: var(--white); line-height: 1.55; font-weight: 300; }
  .itag { font-size: 0.72rem; color: var(--white-dim); margin-top: 3px; letter-spacing: 0.03em; }

  .badge {
    display: inline-block; font-size: 0.62rem; padding: 1px 7px;
    margin-left: 6px; vertical-align: middle;
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
  }
  .bk { background: var(--amber-bg); color: var(--gold-light); border: 1px solid var(--amber); }
  .bt { background: #0a1a2a; color: #7ab3d4; border: 1px solid #2a5a7a; }

  .test-box {
    background: var(--black); border: 1px solid var(--black-border);
    padding: 10px 14px; margin: 8px 0 2px 28px;
    font-size: 0.8rem; color: var(--white-dim); line-height: 1.65;
  }
  .test-box strong { color: var(--white-muted); font-weight: 500; }

  /* Notes */
  .notes-area {
    margin-top: 1.5rem;
    border: 1px solid var(--black-border);
    padding: 1.25rem 1.5rem;
  }
  .notes-title {
    font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold-muted); margin-bottom: 1rem;
  }
  .notes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .note-field label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white-dim); display: block; margin-bottom: 5px; }
  .note-field textarea {
    width: 100%; font-size: 0.82rem;
    border: 1px solid var(--black-border);
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    padding: 8px 10px; resize: none; height: 64px;
    line-height: 1.5; font-weight: 300;
  }
  .note-field textarea:focus { outline: none; border-color: var(--gold-muted); }

  /* Score */
  .score-area {
    margin-top: 1rem; border: 1px solid var(--black-border); padding: 1.25rem 1.5rem;
  }
  .score-title { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-muted); margin-bottom: 1rem; }
  .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .sc {
    background: var(--black-soft); border: 1px solid var(--black-border);
    padding: 10px 12px; cursor: pointer; transition: border-color 0.15s;
    text-align: center;
  }
  .sc:hover { border-color: var(--gold-muted); }
  .sc.ar { border-color: var(--red); background: var(--red-bg); }
  .sc.ay { border-color: var(--amber); background: var(--amber-bg); }
  .sc.ag { border-color: var(--green); background: var(--green-bg); }
  .sc-lbl { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white-dim); margin-bottom: 4px; }
  .sc-val { font-size: 1.4rem; }
  .r-c { color: #c97070; } .y-c { color: var(--gold); } .g-c { color: #6dbf96; }

  .verdict {
    margin-top: 10px; font-size: 0.8rem; letter-spacing: 0.05em;
    padding: 10px 14px; display: none;
  }
  .verdict.show { display: block; }
  .vr { background: var(--red-bg); color: #c97070; border-left: 2px solid var(--red); }
  .vy { background: var(--amber-bg); color: var(--gold-light); border-left: 2px solid var(--amber); }
  .vg { background: var(--green-bg); color: #6dbf96; border-left: 2px solid var(--green); }

  .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .pill {
    font-size: 0.65rem; padding: 3px 11px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 500; border: 1px solid;
  }
  .ps { background: transparent; color: #c97095; border-color: #993556; }
  .pv { background: transparent; color: #9a96d4; border-color: #534AB7; }
  .pc { background: transparent; color: #6dbf96; border-color: #2d6a4f; }
  .pg { background: transparent; color: var(--white-dim); border-color: var(--black-border); }

  .reset-btn {
    margin-top: 1.25rem; font-size: 0.68rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--white-dim);
    background: none; border: 1px solid var(--black-border);
    padding: 7px 16px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--gold-muted); color: var(--white-muted); }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--black-border); margin: 2rem 0; }

  @media (max-width: 600px) {
    .site-header { padding: 1.25rem 1.25rem; }
    .main { padding: 2rem 1.25rem 4rem; }
    .tabs { flex-direction: column; }
    .tab { border-right: none; border-bottom: 1px solid var(--black-border); }
    .tab:last-child { border-bottom: none; }
    .score-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="brand-name">Confecções Valentina Brand</div>

<main class="main">

  <div class="tabs">

    <div class="tab" id="tab-v" onclick="switchTab('v')">

      <span class="tab-sub">~40 min</span>

  <div id="panel-s"></div>

</main>

function switchTab(t){
  ['s','v','c'].forEach(x=>{
    document.getElementById('tab-'+x).className='tab'+(x===t?' active':'');
    document.getElementById('panel-'+x).style.display=x===t?'block':'none';
  });
}

function buildPanel(tab){
  const data=allData[tab],notes=allNotes[tab],s=state[tab];
  let total=0; data.forEach(sec=>total+=sec.items.length);
  const done=Object.values(s.checked).filter(Boolean).length;
  const pct=Math.round((done/total)*100);

  let html=`<div class="meta">
    <span class="pill ${pillClass[tab]}">${roleLabel[tab]}</span>
    <span class="pill pg">${durLabel[tab]}</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">Progresso</span>
      <span class="progress-count">${done} / ${total} itens</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pfColor[tab]}"></div></div>
  </div>`;

  data.forEach((sec,si)=>{
    const testBadge=sec.test?`<span class="badge bt">teste</span>`:'';
    html+=`<div class="section"><div class="sec-hd"><div class="sec-dot" style="background:${sec.color}"></div><span class="sec-title">${sec.title}${testBadge}</span><span class="sec-time">${sec.time}</span></div>`;
    sec.items.forEach((it,ii)=>{
      const k=`${si}-${ii}`,isDone=!!s.checked[k];
      const keyBadge=it.key?`<span class="badge bk">chave</span>`:'';
      const detailBox=it.detail?`<div class="test-box">${it.detail}</div>`:'';
      html+=`<div class="item${isDone?' done':''}" onclick="toggle('${tab}',${si},${ii})">
        <div class="cb"><svg class="ck" width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.2 5.7L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div style="flex:1"><div class="itext">${it.t}${keyBadge}</div><div class="itag">${it.tag}</div>${detailBox}</div>
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`<div class="notes-area"><p class="notes-title">Anotações</p><div class="notes-grid">`;
  notes.forEach(n=>{html+=`<div class="note-field"><label>${n}</label><textarea placeholder=""></textarea></div>`;});
  html+=`</div></div>`;

  const verdText=s.score==='r'?'Perfil não adequado para a vaga neste momento.':
    s.score==='y'?'Potencial identificado. Agendar segunda etapa.':
    s.score==='g'?'Perfil recomendado para contratação. Prosseguir com documentação e integração.':'';

  html+=`<div class="score-area"><p class="score-title">Avaliação final</p><div class="score-grid">
    <div class="sc${s.score==='r'?' ar':''}" onclick="setScore('${tab}','r')"><div class="sc-lbl">Não recomendado</div><div class="sc-val r-c">✗</div></div>
    <div class="sc${s.score==='y'?' ay':''}" onclick="setScore('${tab}','y')"><div class="sc-lbl">2ª etapa</div><div class="sc-val y-c">~</div></div>
    <div class="sc${s.score==='g'?' ag':''}" onclick="setScore('${tab}','g')"><div class="sc-lbl">Contratar</div><div class="sc-val g-c">✓</div></div>
  </div><div class="verdict${s.score?' show':''} ${s.score?'v'+s.score:''}">${verdText}</div></div>`;

  html+=`<button class="reset-btn" onclick="resetTab('${tab}')">↺ Reiniciar entrevista</button>`;
  document.getElementById('panel-'+tab).innerHTML=html;
}

function toggle(tab,si,ii){state[tab].checked[`${si}-${ii}`]=!state[tab].checked[`${si}-${ii}`];buildPanel(tab);}
function setScore(tab,v){state[tab].score=v;buildPanel(tab);}
function resetTab(tab){state[tab]={checked:{},score:null};buildPanel(tab);}

buildPanel('s');buildPanel('v');buildPanel('c');
</script>
</body>
</html>
